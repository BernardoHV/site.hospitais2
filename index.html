async function buscarHospital() {
  const resultadoDiv = document.getElementById("resultado");
  resultadoDiv.innerHTML = "⏳ Obtendo localização...";

  if (!navigator.geolocation) {
    resultadoDiv.innerHTML = "❌ Seu navegador não suporta geolocalização.";
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    const userLat = pos.coords.latitude;
    const userLon = pos.coords.longitude;

    let menorDistancia = Infinity;
    let hospitalMaisProximo = null;

    for (let hospital of hospitais) {
      const distancia = calcularDistancia(userLat, userLon, hospital.Latitude, hospital.Longitude);
      if (distancia < menorDistancia) {
        menorDistancia = distancia;
        hospitalMaisProximo = hospital;
      }
    }

    if (hospitalMaisProximo) {
      resultadoDiv.innerHTML = `
        <strong>${hospitalMaisProximo.Nome}</strong><br>
        ${hospitalMaisProximo.Endereço}, ${hospitalMaisProximo.Cidade} - ${hospitalMaisProximo.Estado}<br>
        🚗 Distância: <strong>${menorDistancia.toFixed(2)} km</strong><br>
        <button onclick="verRota(${userLat}, ${userLon}, ${hospitalMaisProximo.Latitude}, ${hospitalMaisProximo.Longitude})" style="background: #dc3545; margin-top: 10px; padding: 8px 15px; font-size: 0.9em;">🗺️ Ver Rota</button>
      `;
    } else {
      resultadoDiv.innerHTML = "❌ Nenhum hospital encontrado.";
    }

  }, err => {
    resultadoDiv.innerHTML = "⚠️ Erro ao obter localização: " + err.message;
  });
}

async function buscarHospitaisPorRaio(raioKm = 5) {
  const resultadoDiv = document.getElementById("resultado");
  resultadoDiv.innerHTML = "⏳ Obtendo localização...";

  if (!navigator.geolocation) {
    resultadoDiv.innerHTML = "❌ Seu navegador não suporta geolocalização.";
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    const userLat = pos.coords.latitude;
    const userLon = pos.coords.longitude;

    let hospitaisProximos = [];

    for (let hospital of hospitais) {
      const distancia = calcularDistancia(userLat, userLon, hospital.Latitude, hospital.Longitude);
      if (distancia <= raioKm) {
        hospitaisProximos.push({ ...hospital, distancia });
      }
    }

    // Ordena por distância
    hospitaisProximos.sort((a, b) => a.distancia - b.distancia);

    if (hospitaisProximos.length > 0) {
      let html = `<h3>🏥 ${hospitaisProximos.length} Hospital(is) encontrado(s) em ${raioKm}km:</h3>`;
      hospitaisProximos.forEach((h, idx) => {
        html += `
          <div style="border-top: 1px solid #ddd; padding: 10px 0; margin: 10px 0;">
            <strong>${idx + 1}. ${h.Nome}</strong><br>
            ${h.Endereço}, ${h.Cidade} - ${h.Estado}<br>
            🚗 <strong>${h.distancia.toFixed(2)} km</strong><br>
            <button onclick="verRota(${userLat}, ${userLon}, ${h.Latitude}, ${h.Longitude})" style="background: #dc3545; margin-top: 8px; padding: 6px 12px; font-size: 0.85em; max-width: 200px;">🗺️ Ver Rota</button>
          </div>
        `;
      });
      resultadoDiv.innerHTML = html;
    } else {
      resultadoDiv.innerHTML = `⚠️ Nenhum hospital encontrado em um raio de ${raioKm}km.`;
    }
  }, err => {
    resultadoDiv.innerHTML = "⚠️ Erro ao obter localização: " + err.message;
  });
}

function buscarPorCidade() {
  const cidade = prompt("Digite o nome da cidade:");
  if (!cidade) return;

  const hospitaisCidade = hospitais.filter(h => 
    h.Cidade.toLowerCase().includes(cidade.toLowerCase())
  );

  const resultadoDiv = document.getElementById("resultado");
  
  if (hospitaisCidade.length > 0) {
    let html = `<h3>🏥 ${hospitaisCidade.length} Hospital(is) em ${cidade}:</h3>`;
    
    // Obtém localização do usuário para calcular distância
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const userLat = pos.coords.latitude;
        const userLon = pos.coords.longitude;
        
        hospitaisCidade.forEach(h => {
          const dist = calcularDistancia(userLat, userLon, h.Latitude, h.Longitude);
          html += `
            <div style="border-top: 1px solid #ddd; padding: 10px 0; margin: 10px 0;">
              <strong>${h.Nome}</strong><br>
              ${h.Endereço}<br>
              <strong>${h.Cidade} - ${h.Estado}</strong><br>
              🚗 ${dist.toFixed(2)} km<br>
              <button onclick="verRota(${userLat}, ${userLon}, ${h.Latitude}, ${h.Longitude})" style="background: #dc3545; margin-top: 8px; padding: 6px 12px; font-size: 0.85em; max-width: 200px;">🗺️ Ver Rota</button>
            </div>
          `;
        });
        resultadoDiv.innerHTML = html;
      });
    } else {
      hospitaisCidade.forEach(h => {
        html += `
          <div style="border-top: 1px solid #ddd; padding: 10px 0; margin: 10px 0;">
            <strong>${h.Nome}</strong><br>
            ${h.Endereço}<br>
            <strong>${h.Cidade} - ${h.Estado}</strong>
          </div>
        `;
      });
      resultadoDiv.innerHTML = html;
    }
  } else {
    resultadoDiv.innerHTML = `❌ Nenhum hospital encontrado em "${cidade}".`;
  }
}

// Calcula distância direta entre dois pontos (Fórmula de Haversine)
function calcularDistancia(lat1, lon1, lat2, lon2) {
  const R = 6371; // Raio da Terra em km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c; // Distância em km
}

// Abre rota no Google Maps
function verRota(userLat, userLon, hospitalLat, hospitalLon) {
  const url = `https://www.google.com/maps/dir/${userLat},${userLon}/${hospitalLat},${hospitalLon}?tsp=1`;
  window.open(url, '_blank');
}
